name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag, branch, or SHA) to build and publish"
        required: true
        default: "main"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Smoke-test the wheel
        run: |
          python -m venv /tmp/check
          /tmp/check/bin/pip install --quiet dist/*.whl
          /tmp/check/bin/gtfs2geojson --help > /dev/null
          /tmp/check/bin/python -c "import gtfs2geojson; assert gtfs2geojson.__version__"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write       # required for OIDC trusted publishing
      attestations: write   # generates Sigstore attestations
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
